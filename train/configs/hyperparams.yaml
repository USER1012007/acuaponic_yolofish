# Hiperparámetros de entrenamiento
# Ajustar según resultados de las primeras corridas

model: yolov8n.pt       # modelo base preentrenado
imgsz: 640              # resolución de entrada
epochs: 50              # punto de partida; puede reducirse si converge antes
batch: 32               # para 4070 8GB; reducir a 16 si hay OOM
workers: 8              # dataloader workers
device: 0               # GPU index (0 = primera GPU)

# Optimizador
optimizer: AdamW
lr0: 0.001
weight_decay: 0.0005

# Augmentations (valores default de Ultralytics, ajustar si hay overfitting)
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
fliplr: 0.5
mosaic: 1.0
