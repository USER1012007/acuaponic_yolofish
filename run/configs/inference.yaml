camera:
  device_index: 0
  width: 1280
  height: 720
  fps: 30

model:
  hef_path: models/yolov8n_coco.hef
  input_width: 640
  input_height: 640
  input_format: uint8
  input_color: rgb
  class_names:
    - person
    - bicycle
    - car
    - motorcycle
    - airplane
    - bus
    - train
    - truck
    - boat
    - traffic light
    - fire hydrant
    - stop sign
    - parking meter
    - bench
    - bird
    - cat
    - dog
    - horse
    - sheep
    - cow
    - elephant
    - bear
    - zebra
    - giraffe
    - backpack
    - umbrella
    - handbag
    - tie
    - suitcase
    - frisbee
    - skis
    - snowboard
    - sports ball
    - kite
    - baseball bat
    - baseball glove
    - skateboard
    - surfboard
    - tennis racket
    - bottle
    - wine glass
    - cup
    - fork
    - knife
    - spoon
    - bowl
    - banana
    - apple
    - sandwich
    - orange
    - broccoli
    - carrot
    - hot dog
    - pizza
    - donut
    - cake
    - chair
    - couch
    - potted plant
    - bed
    - dining table
    - toilet
    - tv
    - laptop
    - mouse
    - remote
    - keyboard
    - cell phone
    - microwave
    - oven
    - toaster
    - sink
    - refrigerator
    - book
    - clock
    - vase
    - scissors
    - teddy bear
    - hair drier
    - toothbrush

postprocess:
  mode: auto
  confidence_threshold: 0.35
  iou_threshold: 0.45
  max_detections: 100
  raw_has_objectness: false
  nms_box_format: yxyx

output:
  window_name: YOLOv8 Hailo
  json_path: runs/class_counts.json
 write_json_every_n_frames: 1
